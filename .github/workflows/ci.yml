name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  core:
    name: core (classifier · src/)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm lint

  extension:
    name: extension (WXT)
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: extension } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - run: npm install --no-audit --no-fund
      - run: npx tsc --noEmit
      - run: npx wxt build

  edge:
    name: edge (Cloudflare Worker)
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: services/edge } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - run: npm install --no-audit --no-fund
      # Regenerate the inlined Tailwind stylesheet and fail if the committed
      # src/_generated-css.ts is stale (someone edited styles.css without
      # running `npm run build:css`).
      - run: npm run build:css
      - run: git diff --exit-code src/_generated-css.ts
      - run: npx tsc --noEmit
      - run: npm test
