name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag name to release (must already exist, e.g. v0.5.0-firefox)'
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: extension } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - run: npm install --no-audit --no-fund
      - name: Build Chrome zip
        run: npm run zip
      - name: Build Firefox zip
        run: npm run zip:firefox
      - name: Create GitHub Release
        working-directory: ${{ github.workspace }}
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_type == 'tag' && github.ref_name || inputs.tag }}
        run: |
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            extension/.output/*.zip
